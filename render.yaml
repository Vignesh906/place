services:
  - type: web
    name: placement-ai
    runtime: python
    buildCommand: pip install -r requirements.txt && python generate_dataset.py && python placement_model.py
    startCommand: gunicorn placement_app:app --config gunicorn_config.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: SECRET_KEY
        generateValue: true
