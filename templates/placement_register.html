<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register – PlaceAI</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='placement_style.css') }}">
</head>
<body>
<div class="auth-page">
  <div class="auth-wrapper" style="max-width:480px;">
    <div class="auth-card fade-in">
      <div class="auth-logo">
        <div class="logo-icon">🎯</div>
        <h1>Create Account</h1>
        <p>Join PlaceAI – Your placement success starts here</p>
      </div>

      {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}
          <div class="alert alert-{{ category }}">
            {{ '⚠️' if category == 'error' else '✅' }} {{ message }}
          </div>
        {% endfor %}
      {% endwith %}

      <form action="{{ url_for('register') }}" method="POST">
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Username *</label>
            <input type="text" name="username" class="form-control" placeholder="Choose a username" required>
          </div>
          <div class="form-group">
            <label class="form-label">Email *</label>
            <input type="email" name="email" class="form-control" placeholder="your@email.com" required>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Password *</label>
            <input type="password" name="password" class="form-control" placeholder="Min 6 characters" required>
          </div>
          <div class="form-group">
            <label class="form-label">Confirm Password *</label>
            <input type="password" name="confirm_password" class="form-control" placeholder="Repeat password" required>
          </div>
        </div>

        <button type="submit" class="btn btn-primary btn-full">Create Account →</button>
      </form>

      <hr class="divider">
      <p class="text-center text-muted">
        Already have an account?
        <a href="{{ url_for('login') }}" style="color:var(--accent);text-decoration:none;font-weight:600;">
          Sign in
        </a>
      </p>
    </div>
  </div>
</div>
</body>
</html>
